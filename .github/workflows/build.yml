name: Build Orrin (desktop app)

# Builds downloadable, UNSIGNED Orrin bundles on macOS (arm64 + Intel), Windows, and
# Linux — all from GitHub's runners, so no Windows/Linux hardware is needed. PyInstaller
# can't cross-compile, which is exactly why each OS builds on its own runner.
#
# Run it: push a tag like `v0.1.0`, or trigger manually (Actions tab → Run workflow).
# Artifacts (.dmg / .zip / .tar.gz) attach to the run; on a tag they also attach to a
# GitHub Release. Signing comes later (I4): macOS users right-click→Open past Gatekeeper,
# Windows users click "More info → Run anyway" past SmartScreen once.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write   # the release step attaches installers to a GitHub Release on tags

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # one OS failing must not abort the others
      matrix:
        include:
          - os: macos-14      # Apple Silicon
            name: macos-arm64
          - os: macos-13      # Intel
            name: macos-x64
          - os: windows-latest
            name: windows-x64
          - os: ubuntu-latest
            name: linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build the UI (bundled from disk; no npm at runtime)
        working-directory: frontend
        run: npm ci && npm run build

      # On Linux, default PyPI torch is the multi-GB CUDA build. Orrin is a CPU desktop
      # app, so pin the CPU wheel BEFORE requirements resolves sentence-transformers' dep.
      - name: Install CPU torch (Linux)
        if: runner.os == 'Linux'
        run: pip install "torch>=2.2" --index-url https://download.pytorch.org/whl/cpu

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Stamp the release version (I7 auto-update)
        run: python packaging/set_version.py
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Pre-fetch ML weights into the bundle (offline first-run, I2)
        run: python packaging/bundle_models.py --out packaging/build/models

      - name: Freeze (PyInstaller, I3)
        run: pyinstaller packaging/orrin.spec --noconfirm

      # Stage a private CPython into the bundle so the sandbox doesn't fall back to the
      # host (I1). Best-effort: a failure logs and continues (host fallback still works).
      - name: Stage embedded CPython (I1)
        run: python packaging/stage_embedded_python.py

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME:-}"
          if [[ "$REF" == v* ]]; then echo "version=${REF#v}" >> "$GITHUB_OUTPUT";
          else echo "version=0.0.0" >> "$GITHUB_OUTPUT"; fi

      # ── Package per OS ──────────────────────────────────────────────────────
      - name: Package macOS .dmg
        if: runner.os == 'macOS'
        run: hdiutil create -volname Orrin -srcfolder dist/Orrin.app -ov -format UDZO "dist/Orrin-${{ matrix.name }}.dmg"

      # A raw .zip stays as a fallback; the Setup.exe (below) is the real installer.
      - name: Package Windows .zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/Orrin/* -DestinationPath "dist/Orrin-${{ matrix.name }}.zip"

      # Real installer (I5): bundle the WebView2 bootstrapper + build a Setup.exe.
      - name: Build Windows installer (I5)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "packaging/windows/MicrosoftEdgeWebview2Setup.exe"
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.ver.outputs.version }}" "packaging\windows\orrin.iss"

      # A raw .tar.gz stays as a fallback; the AppImage (below) is the real app.
      - name: Package Linux .tar.gz
        if: runner.os == 'Linux'
        run: tar -C dist -czf "dist/Orrin-${{ matrix.name }}.tar.gz" Orrin

      # Real AppImage (I6). WebKitGTK is the native-window runtime dep on Linux.
      - name: Build Linux AppImage (I6)
        if: runner.os == 'Linux'
        env:
          ORRIN_VERSION: ${{ steps.ver.outputs.version }}
          ARCH: x86_64
        run: |
          sudo apt-get update && sudo apt-get install -y libfuse2 || true
          bash packaging/linux/make_appimage.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orrin-${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.tar.gz
            dist/*.exe
            dist/*.AppImage
          if-no-files-found: error

      # On a tag, attach the installers to a GitHub Release so people can download them.
      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.tar.gz
            dist/*.exe
            dist/*.AppImage
