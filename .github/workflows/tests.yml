name: tests

# CI realization of `make verify` (the documented local gate): Ruff + the
# hermetic pytest suite, the frontend type-check/lint/build, and a repo-hygiene
# check that no generated runtime artifacts get re-tracked. Keeping the workflow
# name `tests` and a `pytest` job preserves any existing required-status-check.

on:
  push:
  pull_request:

jobs:
  pytest:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r backend/requirements.txt
          pip install pytest ruff mypy
          # Optional LLM SDKs: lazy-imported at runtime (kept out of requirements/bundle),
          # but installed here so the real-SDK adapter verification actually runs in CI.
          pip install anthropic google-genai

      - name: Ruff (high-signal lint gate)
        run: python -m ruff check .

      - name: mypy (strict type-check of the typed-module allowlist; Phase 5.0)
        run: python -m mypy

      - name: Run test suite (hermetic; see tests/conftest.py)
        run: python -m pytest -q
        # The two embedder tests that used to be deselected here are now hermetic
        # (Phase 0): they pass with the real sentence-transformers installed, so
        # the deselects were removed and the full suite runs.

  coverage:
    name: coverage (ratcheted floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r backend/requirements.txt
          pip install pytest coverage
          pip install anthropic google-genai

      - name: Run suite under coverage
        run: |
          python -m coverage run -m pytest -q
          python -m coverage json -o coverage.json
          python -m coverage report

      - name: Coverage ratchet (fail if below .coverage-floor)
        # Ratcheted floor, not an arbitrary target: the floor only moves up
        # (via `make coverage-update`). See brain/scripts/coverage_ratchet.py.
        run: python -m brain.scripts.coverage_ratchet --json coverage.json

  frontend:
    name: frontend (typecheck + lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  hygiene:
    name: repo hygiene (no tracked generated files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generated runtime artifacts must stay untracked (Phase 1)
        run: |
          status=0
          for f in repo_tree.txt trace.jsonl tunnel_url.txt brain/prompts_backup.json; do
            if git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              echo "::error::generated/runtime file must be gitignored, not tracked: $f"
              status=1
            fi
          done
          exit $status
