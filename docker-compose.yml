# Orrin — one-command full stack.
#
#   docker compose up --build
#
# Then open the Face & Brain UI at http://localhost:8800
# (the backend serves the built SPA and the telemetry API/WebSocket on the same
# port; Prometheus metrics on :9100).
#
# API keys are optional. To supply them, create a `.env` file next to this file:
#   OPENAI_API_KEY=sk-...     # enables LLM tool calls (symbolic-only without it)
#   SERPER_API_KEY=...        # enables live web search (local-file fallback without it)
# Compose reads that `.env` automatically for the ${...} substitutions below.

services:
  orrin:
    # Prefer the prebuilt multi-arch image (amd64 + arm64) — `docker compose pull`
    # grabs it so you don't have to build. `build: .` is the fallback for
    # `docker compose up --build` (builds natively for your machine).
    image: ghcr.io/ric-massey/orrin_v3:latest
    build: .
    container_name: orrin
    ports:
      - "8800:8800"   # Face & Brain UI (static) + telemetry API + WebSocket
      - "9100:9100"   # Prometheus metrics
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      ORRIN_BACKEND_HOST: "0.0.0.0"
      ORRIN_BACKEND_PORT: "8800"
      ORRIN_UI: "1"
      # Serve the built SPA statically from the backend (no Vite dev server, no
      # native window). ORRIN_UI_DEV is intentionally unset → main.py's static
      # path. Don't try to open a browser inside the container.
      ORRIN_UI_OPEN: "0"
      # Metrics are opt-in (off by default in a source/desktop run). The container
      # turns them on and pins the port so the published :9100 below actually serves.
      ORRIN_METRICS: "1"
      ORRIN_METRICS_PORT: "9100"
    volumes:
      # Named volumes — Docker seeds them from the image's tracked seed state on
      # first run, then persists the live "mind" across restarts. (A bind mount
      # would start EMPTY and wipe the seed state, so we use named volumes here.)
      - orrin_brain_data:/app/brain/data
      - orrin_data:/app/data
    restart: unless-stopped

volumes:
  orrin_brain_data:
  orrin_data:
