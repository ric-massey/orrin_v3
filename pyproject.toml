[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "orrin"
version = "3.30.0"
description = "Orrin — an autonomous cognitive agent (brain loop, goals/memory daemons, backend API)."
requires-python = ">=3.10"
# ── Dependency model (CODEBASE_CLEANUP_PLAN Phase 2) ─────────────────────────
# pyproject.toml is the single source of truth. requirements.txt and
# backend/requirements.txt are compatibility mirrors GENERATED from these
# groups — do not hand-edit them; update here and re-mirror (see their headers).
#
# `dependencies` below is the minimal core the brain loop + memory/goals daemons
# need to run and to pass the test suite. Everything optional is an extra:
#   backend    — FastAPI telemetry/control API + websocket
#   desktop    — native window, tray, OS-keychain secrets
#   embedding  — real sentence-transformers (else deterministic hash fallback)
#   nlp        — spaCy entity extraction (else regex fallback; then
#                `python -m spacy download en_core_web_sm`)
#   llm        — default OpenAI client (also drives Local/Custom endpoints)
#   llm-extra  — pluggable Anthropic / Google providers (imported lazily)
#   dev        — test + lint + coverage tooling
#   all        — full product runtime (what requirements.txt installs)
# Heavyweight installs: `embedding` pulls torch (~CPU wheel; CUDA build is ~2 GB
# — see Dockerfile for the CPU-only index trick), and `nlp` needs a model
# download. Install just what you need: `pip install -e .[backend,dev]`.
dependencies = [
    "prometheus_client>=0.20",
    "numpy>=1.26",
    "requests>=2.31",
    "beautifulsoup4>=4.12",
    "watchdog==6.0.0",
    "python-dotenv>=1.0.1",
    "psutil>=5.9",
]

[project.optional-dependencies]
backend = ["fastapi>=0.111", "uvicorn[standard]>=0.30"]
desktop = ["pywebview>=5.0", "pystray>=0.19", "Pillow>=10.0", "keyring>=24.0"]
embedding = ["sentence-transformers>=2.7"]
nlp = ["spacy>=3.7"]
llm = ["openai>=1.40.0"]
llm-extra = ["anthropic>=0.40.0", "google-genai>=0.3.0"]
dev = ["pytest>=8.0", "ruff>=0.5", "coverage>=7.4", "mypy>=1.8"]
# Recursive extra: the full runtime a packaged/desktop build ships.
all = ["orrin[backend,desktop,embedding,nlp,llm,llm-extra]"]

# ── Packaging note (Finding 5) ──────────────────────────────────────────────
# This declares the project's dependencies and makes the top-level daemon
# packages (goals, memory, reaper, backend, observability) and the `brain`
# package itself pip-installable as a unit (`pip install -e .`).
#
# Finding 5's deeper issue is now resolved: brain/'s subpackages are imported
# under the canonical `brain.*` namespace (Phase 3), pytest.ini uses
# `pythonpath = .` (repo root only), and main.py no longer prepends `brain/` onto
# sys.path — self-written code is normalized onto `brain.*` at write time
# (agency/self_code.normalize_self_code_imports). The package installs and imports
# with only the repo root present.
[tool.setuptools]
packages = ["backend", "brain", "goals", "memory", "observability", "reaper"]

# ── Ruff (CODEBASE_CLEANUP_PLAN Phase 1 — "narrow Ruff configuration") ───────
# Deliberately narrow: enforce the high-signal pyflakes logical-error rules
# (undefined names, unused imports, duplicate definitions, referenced-before-
# assignment, broken f-strings, syntax errors) and keep them green. The noisy
# mechanical style rules are introduced incrementally in later phases, NOT via
# a repository-wide auto-fix:
#   - F841 (unused local variables): 26 findings; ruff's fixes are "unsafe"
#     (the discarded RHS may have side effects), so this is a manual follow-up.
#   - E402 / E701 / E702 / E401 / E741 / E731: ~440 mechanical findings; these
#     are the semicolon/import-order reformatting deferred to Phase 1's
#     "expand semicolon-compressed statements in small batches".
[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = ["frontend", "build", "dist", ".venv", "data", "brain/data"]

[tool.ruff.lint]
# "F" = all pyflakes rules (real logical errors). E9 = syntax/IO errors.
# F841 (unused locals) is now enforced — the historical debt was cleared in the
# 2026-06-21 cleanup pass; one intentional "keep computed" site carries `# noqa: F841`.
select = ["F", "E9"]
ignore = []

# ── mypy (CODEBASE_CLEANUP_PLAN Phase 5.0) ──────────────────────────────────
# Type-checking gate, folded into `make verify`. The codebase is largely
# untyped, so rather than a lenient whole-tree pass (which would never have
# teeth), this is a STRICT check of an explicit, growing allowlist: `files`
# below lists every module that has been brought up to `--strict`. Running
# `mypy` with no args checks exactly those files; legacy modules are only
# imported (follow_imports = silent), never deep-checked. As Phase 5 types each
# module it joins this list — which grows monotonically and is never shrunk to
# make a change pass (the Phase-5 exit criterion).
[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
follow_imports = "silent"
files = [
    "brain/loop/constants.py",
    # Foundational utils — typed + their `type: ignore`s triaged/narrowed (Phase 5.3).
    "brain/utils/num.py",
    "brain/utils/log.py",
    "brain/utils/json_utils.py",
    # State-schema migration spine — extended + version-subsumed in Phase 5.4.
    "brain/utils/schema_migration.py",
    # selection/ package — the recently-extracted selector core (Phase 4.5A),
    # typed leaf-first (Phase 5.1).
    "brain/think/think_utils/selection/tag_sets.py",
    "brain/think/think_utils/selection/constants.py",
    "brain/think/think_utils/selection/routing.py",
    "brain/think/think_utils/selection/text.py",
    "brain/think/think_utils/selection/catalog.py",
    "brain/think/think_utils/selection/state.py",
    "brain/think/think_utils/selection/features.py",
    "brain/think/think_utils/selection/scoring.py",
    "brain/think/think_utils/selection/candidates.py",
    "brain/think/think_utils/selection/boosts.py",
    "brain/think/think_utils/selection/score_actions.py",
    "brain/think/think_utils/selection/score_setup.py",
    "brain/think/think_utils/selection/pick.py",
    # The selector entry point itself — typed once its whole callee tree
    # (selection/) was strict-clean (Phase 5.1).
    "brain/think/think_utils/select_function.py",
    # planning/ package — typed leaf-first, mirroring selection/ (Phase 5.1).
    "brain/cognition/planning/plan_versioning.py",
    "brain/cognition/planning/goal_progress.py",
    "brain/cognition/planning/goal_satiety.py",
    "brain/cognition/planning/diagnosis.py",
    "brain/cognition/planning/goal_types.py",
    "brain/cognition/planning/env_snapshot.py",
    "brain/cognition/planning/thinking_depth.py",
    "brain/cognition/planning/goal_belief.py",
    "brain/cognition/planning/goals_schema.py",
    "brain/cognition/planning/goal_comprehension.py",
    "brain/cognition/planning/goal_criteria.py",
    "brain/cognition/planning/motivations.py",
    "brain/cognition/planning/problem_refocus.py",
    "brain/cognition/planning/step_execution.py",
    "brain/cognition/planning/introspection.py",
    "brain/cognition/planning/reflection.py",
    "brain/cognition/planning/goal_planning.py",
    "brain/cognition/planning/goal_adaptation.py",
    "brain/cognition/planning/goal_execution.py",
    "brain/cognition/planning/pursue_goal.py",
    "brain/cognition/planning/goal_reconcile.py",
    "brain/cognition/planning/outcome_metrics.py",
    "brain/cognition/planning/executive.py",
    "brain/cognition/planning/goal_arbiter.py",
    "brain/cognition/planning/goal_closure.py",
    "brain/cognition/planning/goal_lifecycle.py",
    "brain/cognition/planning/goals.py",
    "brain/cognition/planning/goal_plan_ops.py",
    "brain/cognition/planning/evolution.py",
    "brain/cognition/planning/goal_store.py",
    "brain/cognition/planning/goal_outcomes.py",
]
