# ── Coverage (CODEBASE_CLEANUP_PLAN Phase 7 — ratcheted coverage) ────────────
# Measure line coverage of the hand-maintained source packages (tests and
# generated/CLI-only scripts excluded). The *ratchet* — the recorded floor and
# the fail-if-below-it gate — lives in brain/scripts/coverage_ratchet.py /
# `make coverage`; this is just how coverage is measured.
[tool.coverage.run]
branch = false
source = ["brain", "backend", "goals", "memory", "supervisor", "runtime", "observability"]
omit = [
    "*/__pycache__/*",
    "*/tests/*",
    "*_test.py",
    "brain/scripts/*",
]

[tool.coverage.report]
precision = 1
show_missing = false
exclude_also = [
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@(abc\\.)?abstractmethod",
]
