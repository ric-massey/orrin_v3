    "brain/loop/boot_checks.py",
    "brain/loop/maintenance.py",
    "brain/loop/sense.py",
    "brain/loop/boot.py",
    "brain/loop/finalize.py",
    "brain/loop/execute.py",
    # supervisor/ — the watchdog suite; brought strict + its optional-metric import
    # fallbacks narrowed from blanket to [assignment] ignores (Phase 5.3).
    "supervisor/__init__.py",
    "supervisor/errors.py",
    "supervisor/trend.py",
    "supervisor/repeat.py",
    "supervisor/lifespan.py",
    "supervisor/no_goals.py",
